                    document.close();

                    try {
                        const manifestData = {
                            name: customAppName,
                            short_name: customAppName,
                            display: "standalone",
                            start_url: window.location.href.split('?')[0],
                            icons: [{
                                src: finalPwaIcon,
                                sizes: "any"
                            }]
                        };
                        const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/manifest+json' });
                        const link = document.createElement('link');
                        link.rel = 'manifest';
                        link.href = URL.createObjectURL(manifestBlob);
                        document.head.appendChild(link);
                    } catch(e) {}

                    window.deferredPrompt = null;
                    window.addEventListener('beforeinstallprompt', (e) => {
                        e.preventDefault();
                        window.deferredPrompt = e;
                        const btn = document.getElementById('staticrypt-btn-save');
                        if (btn) btn.innerText = 'Install App & Keep Unlocked';
                    });

                    setTimeout(() => {
                        let hasIcon = false;
                        const icons = document.querySelectorAll('link[rel="icon"], link[rel="shortcut icon"]');
                        icons.forEach(icon => {
                            hasIcon = true;
                            const href = icon.href;
                            icon.remove();
                            const newIcon = document.createElement('link');
                            newIcon.rel = icon.rel;
                            newIcon.href = href;
                            document.head.appendChild(newIcon);
                        });
                        
                        if (!hasIcon) {
                            const defaultIcon = document.createElement('link');
                            defaultIcon.rel = 'icon';
                            defaultIcon.href = finalFavicon;
                            document.head.appendChild(defaultIcon);
                        }
                    }, 100);

                    if (!isFromStorage) {
                        setTimeout(() => {
                            const modalHtml = '<div id="staticrypt-install-modal" style="position: fixed; inset: 0; background: rgba(15, 23, 42, 0.75); display: flex; align-items: center; justify-content: center; z-index: 2147483647; font-family: system-ui, -apple-system, sans-serif; backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.3s ease;">' +
                                '<div style="background: white; padding: 24px; border-radius: 16px; max-width: 320px; width: 90%; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); transform: translateY(20px); transition: transform 0.3s ease;" id="staticrypt-modal-content">' +
                                    '<h2 style="margin: 0 0 12px 0; color: #0f172a; font-size: 1.25rem; font-weight: 700;">Keep this unlocked?</h2>' +
                                    '<p style="margin: 0 0 24px 0; color: #475569; font-size: 0.875rem; line-height: 1.5;">Would you like to save this file to this device? You won\'t need to use the link with the password next time you open this file here.</p>' +
                                    '<div style="display: flex; flex-direction: column; gap: 8px;">' +
                                        '<button id="staticrypt-btn-save" style="background: #2563eb; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s;">Yes, keep me unlocked</button>' +
                                        '<button id="staticrypt-btn-close" style="background: #f1f5f9; color: #475569; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s;">No, ask next time</button>' +
                                    '</div>' +
                                '</div>' +
                            '</div>';
                            
                            const div = document.createElement('div');
                            div.innerHTML = modalHtml;
                            document.body.appendChild(div);

                            setTimeout(() => {
                                const modal = document.getElementById('staticrypt-install-modal');
                                const content = document.getElementById('staticrypt-modal-content');
                                if(modal && content) {
                                    modal.style.opacity = '1';
                                    content.style.transform = 'translateY(0)';
                                }
                            }, 10);

                            const closePopup = () => {
                                document.getElementById('staticrypt-install-modal').style.opacity = '0';
                                setTimeout(() => div.remove(), 300);
                            };

                            document.getElementById('staticrypt-btn-save').onclick = () => {
                                safeSetStorage('staticrypt_pwd_' + saltHex, password);
                                
                                if (window.deferredPrompt) {
                                    window.deferredPrompt.prompt();
                                    window.deferredPrompt.userChoice.then(() => {
                                        window.deferredPrompt = null;
                                        closePopup();
                                    });
                                } else {
                                    showMessage('Saved! You won\'t need the password on this device. (You can also Add to Home Screen via browser menu)');
                                    closePopup();
                                }
                            };
                            
                            document.getElementById('staticrypt-btn-close').onclick = closePopup;
                        }, 500); 
                    }

                } catch (err) {
                    console.error("Authentication failed.", err);
                    if (isFromStorage) {
                        safeRemoveStorage('staticrypt_pwd_' + saltHex);
                    }
                    // Show actual failure instead of leaving it totally blank when explicitly trying a password
                    document.body.innerHTML = '<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f8fafc;"><div style="background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); text-align: center; max-width: 400px; width: 90%; font-family: system-ui, sans-serif;"><svg style="width: 48px; height: 48px; margin: 0 auto 1rem; color: #ef4444;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg><h2 style="margin: 0 0 0.5rem; color: #0f172a; font-size: 1.25rem; font-weight:700;">Decryption Failed</h2><p style="margin: 0; color: #64748b; font-size: 0.875rem;">The password provided is incorrect or the file data is corrupted. Please refresh the page and try again.</p></div></div>';
                }
            } else {
                // STEALTH MODE: Setup a hidden triple-click trigger to prompt for password
                let clicks = 0;
                let clickTimer;
                document.body.addEventListener('click', () => {
                    clicks++;
                    clearTimeout(clickTimer);
                    if (clicks >= 3) {
                        showPasswordPrompt();
                        clicks = 0;
                    } else {
                        clickTimer = setTimeout(() => { clicks = 0; }, 500);
                    }
                });
                
                function showPasswordPrompt() {
                    if(document.getElementById('stealth-pwd-modal')) return;
                    const div = document.createElement('div');
                    div.id = 'stealth-pwd-modal';
                    div.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.7);display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif;z-index:99999;backdrop-filter:blur(4px);opacity:0;transition:opacity 0.2s;';
                    div.innerHTML = '<div style="background:white;padding:24px;border-radius:16px;width:320px;max-width:90%;box-shadow:0 20px 25px -5px rgba(0,0,0,0.1);transform:translateY(10px);transition:transform 0.2s;" id="stealth-pwd-box"><h3 style="margin:0 0 8px 0;color:#0f172a;font-size:1.25rem;">Unlock File</h3><p style="margin:0 0 16px 0;color:#64748b;font-size:0.875rem;">Please enter the decryption password.</p><input type="password" id="stealth-pwd-input" style="width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:8px;margin-bottom:16px;box-sizing:border-box;outline:none;font-size:1rem;" placeholder="Password..." /><div style="display:flex;gap:8px;"><button id="stealth-pwd-submit" style="flex:1;background:#2563eb;color:white;border:none;padding:12px;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.9rem;">Unlock</button><button id="stealth-pwd-cancel" style="flex:1;background:#f8fafc;color:#475569;border:1px solid #e2e8f0;padding:12px;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.9rem;">Cancel</button></div></div>';
                    document.body.appendChild(div);
                    
                    setTimeout(() => {
                        div.style.opacity = '1';
                        document.getElementById('stealth-pwd-box').style.transform = 'translateY(0)';
                    }, 10);
                    
                    document.getElementById('stealth-pwd-input').focus();
                    
                    document.getElementById('stealth-pwd-submit').onclick = () => {
                        const pwd = document.getElementById('stealth-pwd-input').value;
                        if(pwd) window.location.href = window.location.pathname + '?page=' + encodeURIComponent(pwd);
                    };
                    document.getElementById('stealth-pwd-cancel').onclick = () => {
                        div.style.opacity = '0';
                        setTimeout(() => div.remove(), 200);
                    };
                    document.getElementById('stealth-pwd-input').onkeydown = (e) => {
                        if(e.key === 'Enter') document.getElementById('stealth-pwd-submit').click();
                    };
                }
            }
        };
    </script>
</body>
</html>
